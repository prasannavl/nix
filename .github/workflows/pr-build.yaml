name: pr/build

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  approval-gate:
    if: github.event.pull_request.head.ref != 'master' && github.event.pull_request.head.repo.full_name == github.repository
    name: pr/approval-gate
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.review-decision.outputs.approved }}
    steps:
      - name: pr/review-decision
        id: review-decision
        uses: actions/github-script@v7
        with:
          script: |
            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewDecision
                  }
                }
              }
            `;
            const variables = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: context.payload.pull_request.number,
            };
            const result = await github.graphql(query, variables);
            const reviewDecision = result.repository.pullRequest.reviewDecision ?? "REVIEW_REQUIRED";
            const approved = reviewDecision === "APPROVED";

            core.info(`PR reviewDecision=${reviewDecision}`);
            core.setOutput("approved", approved ? "true" : "false");

  build-dry-run:
    if: needs.approval-gate.outputs.approved == 'true'
    name: pr/build
    needs:
      - approval-gate
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: tailscale/setup
        shell: bash
        run: |
          set -euo pipefail
          echo "TS_HOSTNAME=gh-nixbot-build-${GITHUB_RUN_NUMBER}ts" >> "$GITHUB_ENV"

      - name: tailscale/connect
        id: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TAILSCALE_OIDC_AUDIENCE }}
          tags: tag:ci
          hostname: ${{ env.TS_HOSTNAME }}
          version: latest

      - name: git/checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: nix/install
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: nixbot/deps
        shell: bash
        run: |
          set -euo pipefail
          nix run .#nixbot -- deps >/dev/null

      - name: nixbot/build-dry-run
        shell: bash
        env:
          NIXBOT_BASTION_SSH_KEY: ${{ secrets.NIXBOT_BASTION_SSH_KEY }}
          NIXBOT_BASTION_KNOWN_HOSTS: ${{ secrets.NIXBOT_BASTION_KNOWN_HOSTS }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [ -z "${NIXBOT_BASTION_SSH_KEY:-}" ]; then
            echo "Missing required secret: NIXBOT_BASTION_SSH_KEY" >&2
            exit 1
          fi

          nix run .#nixbot -- build \
            --dry \
            --bastion-trigger \
            --sha "${PR_HEAD_SHA}"
