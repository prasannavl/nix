name: nixbot

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      action:
        description: all, build, deploy, or tf
        required: true
        default: all
        type: choice
        options:
          - all
          - deploy
          - build
          - tf
      hosts:
        description: Comma/space-separated hosts, or all
        required: true
        default: all
        type: string
      dry:
        description: Run TF plan / deploy dry-run when supported by the action
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: nixbot-master
  cancel-in-progress: false

jobs:
  run:
    if: github.ref == 'refs/heads/master'
    name: nixbot
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Build Tailscale hostname
        shell: bash
        run: |
          set -euo pipefail
          echo "TS_HOSTNAME=gh-nixbot-${GITHUB_RUN_NUMBER}ts" >> "$GITHUB_ENV"

      - name: Connect to Tailscale
        id: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TAILSCALE_OIDC_AUDIENCE }}
          tags: tag:ci
          hostname: ${{ env.TS_HOSTNAME }}
          version: latest

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix runtime
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Warm nixbot runtime shell
        shell: bash
        run: |
          set -euo pipefail

          # Warm the nixbot runtime closure before the real deploy so the
          # initial fetch/install noise stays out of the Remote action logs.
          ./scripts/nixbot-deploy.sh --ensure-deps >/dev/null

      - name: Remote action
        shell: bash
        env:
          DEPLOY_BASTION_SSH_KEY: ${{ secrets.NIXBOT_BASTION_SSH_KEY }}
          DEPLOY_BASTION_KNOWN_HOSTS: ${{ secrets.NIXBOT_BASTION_KNOWN_HOSTS }}
          GITHUB_INPUT_ACTION: ${{ github.event.inputs.action || '' }}
          GITHUB_INPUT_HOSTS: ${{ github.event.inputs.hosts || '' }}
          GITHUB_INPUT_DRY: ${{ github.event.inputs.dry || '' }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_BASTION_SSH_KEY:-}" ]; then
            echo "Missing required secret: NIXBOT_BASTION_SSH_KEY" >&2
            exit 1
          fi

          input_action="${GITHUB_INPUT_ACTION:-}"
          input_hosts="${GITHUB_INPUT_HOSTS:-all}"
          input_dry="${GITHUB_INPUT_DRY:-false}"
          hosts="${input_hosts:-all}"
          action="${input_action:-}"
          extra_args=()
          if [ -z "${action}" ]; then
            action="all"
          fi
          if [ "${input_dry}" = "true" ]; then
            extra_args+=(--dry)
          fi

          ./scripts/nixbot-deploy.sh \
            --bastion-trigger \
            --bastion-first \
            --hosts "${hosts}" \
            --action "${action}" \
            "${extra_args[@]}" \
            --sha "${GITHUB_SHA}"
