name: nixbot

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      action:
        description: all, build, deploy, or tf
        required: true
        default: all
        type: choice
        options:
          - all
          - deploy
          - build
          - tf
      hosts:
        description: Comma/space-separated hosts, or all
        required: true
        default: all
        type: string
      dry:
        description: Dry run (tf plan, build and sanity checks only)
        required: true
        default: false
        type: boolean
      force:
        description: Force (tf apply, deploy always)
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: nixbot-master
  cancel-in-progress: false

jobs:
  run:
    if: github.ref == 'refs/heads/master'
    name: nixbot
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: tailscale/setup
        shell: bash
        run: |
          set -euo pipefail
          echo "TS_HOSTNAME=gh-nixbot-${GITHUB_RUN_NUMBER}ts" >> "$GITHUB_ENV"

      - name: tailscale/connect
        id: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TAILSCALE_OIDC_AUDIENCE }}
          tags: tag:ci
          hostname: ${{ env.TS_HOSTNAME }}
          version: latest

      - name: git/checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: nix/install
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: nix/cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
          use-gha-cache: true

      - name: repo/lint
        shell: bash
        run: |
          set -euo pipefail
          nix run path:.#lint

      - name: nixbot/ensure-deps
        shell: bash
        run: |
          set -euo pipefail

          # Warm the nixbot runtime closure before the real deploy so the
          # initial fetch/install noise stays out of the Remote action logs.
          ./scripts/nixbot-deploy.sh --ensure-deps >/dev/null

      - name: nixbot/run
        shell: bash
        env:
          DEPLOY_BASTION_SSH_KEY: ${{ secrets.NIXBOT_BASTION_SSH_KEY }}
          DEPLOY_BASTION_KNOWN_HOSTS: ${{ secrets.NIXBOT_BASTION_KNOWN_HOSTS }}
          GITHUB_INPUT_ACTION: ${{ github.event.inputs.action || '' }}
          GITHUB_INPUT_HOSTS: ${{ github.event.inputs.hosts || '' }}
          GITHUB_INPUT_DRY: ${{ github.event.inputs.dry || '' }}
          GITHUB_INPUT_FORCE: ${{ github.event.inputs.force || '' }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_BASTION_SSH_KEY:-}" ]; then
            echo "Missing required secret: NIXBOT_BASTION_SSH_KEY" >&2
            exit 1
          fi

          input_action="${GITHUB_INPUT_ACTION:-}"
          input_hosts="${GITHUB_INPUT_HOSTS:-all}"
          input_dry="${GITHUB_INPUT_DRY:-false}"
          input_force="${GITHUB_INPUT_FORCE:-false}"
          hosts="${input_hosts:-all}"
          action="${input_action:-}"
          extra_args=()
          if [ -z "${action}" ]; then
            action="all"
          fi
          if [ "${input_dry}" = "true" ]; then
            extra_args+=(--dry)
          fi
          if [ "${input_force}" = "true" ]; then
            extra_args+=(--force)
          fi

          ./scripts/nixbot-deploy.sh \
            --bastion-trigger \
            --bastion-first \
            --hosts "${hosts}" \
            --action "${action}" \
            "${extra_args[@]}" \
            --sha "${GITHUB_SHA}"
