name: nixbot

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      hosts:
        description: Comma/space-separated hosts, or all
        required: true
        default: all
        type: string
      deploy:
        description: Run deploy (otherwise build only)
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  run:
    if: github.ref == 'refs/heads/master'
    name: nixbot
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Build Tailscale hostname
        shell: bash
        run: |
          set -euo pipefail
          echo "TS_HOSTNAME=gh-nixbot-${GITHUB_RUN_NUMBER}ts" >> "$GITHUB_ENV"

      - name: Connect to Tailscale
        id: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TAILSCALE_OIDC_AUDIENCE }}
          tags: tag:ci
          hostname: ${{ env.TS_HOSTNAME }}
          version: latest

      - name: Checkout
        uses: actions/checkout@v4

      - name: Remote action
        shell: bash
        env:
          DEPLOY_BASTION_SSH_KEY: ${{ secrets.NIXBOT_BASTION_SSH_KEY }}
          DEPLOY_BASTION_KNOWN_HOSTS: ${{ secrets.NIXBOT_BASTION_KNOWN_HOSTS }}
          GITHUB_INPUT_HOSTS: ${{ github.event.inputs.hosts || '' }}
          GITHUB_INPUT_DEPLOY: ${{ github.event.inputs.deploy || '' }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_BASTION_SSH_KEY:-}" ]; then
            echo "Missing required secret: NIXBOT_BASTION_SSH_KEY" >&2
            exit 1
          fi

          input_hosts="${GITHUB_INPUT_HOSTS:-all}"
          input_deploy="${GITHUB_INPUT_DEPLOY:-true}"
          hosts="${input_hosts:-all}"
          action="build"
          if [ "${input_deploy}" = "true" ]; then
            action="deploy"
          fi

          ./scripts/nixbot-deploy.sh \
            --bastion-trigger \
            --hosts "${hosts}" \
            --action "${action}" \
            --sha "${GITHUB_SHA}"
