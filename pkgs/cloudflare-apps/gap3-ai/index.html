<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gap3.ai</title>
    <meta
      name="description"
      content="gap3.ai static site served from a Cloudflare Worker."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6efe2;
        --bg-accent: #f0d7b5;
        --text: #18212d;
        --shadow: rgba(24, 33, 45, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at top, rgba(240, 215, 181, 0.9), transparent 50%),
          linear-gradient(160deg, var(--bg), #fffaf2 48%, #efe3ce 100%);
        color: var(--text);
        display: flex;
        font-family: Georgia, "Times New Roman", serif;
        justify-content: center;
        padding: 24px;
      }

      main {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(24, 33, 45, 0.08);
        border-radius: 24px;
        box-shadow: 0 24px 80px var(--shadow);
        max-width: 640px;
        padding: 56px 40px;
        text-align: center;
        width: min(100%, 640px);
      }

      p {
        font-size: clamp(1rem, 2vw, 1.25rem);
        letter-spacing: 0.08em;
        margin: 0 0 16px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(3.5rem, 14vw, 7rem);
        line-height: 0.95;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <p>gap3.ai</p>
      <h1>Hello</h1>
    </main>
  </body>
</html>
