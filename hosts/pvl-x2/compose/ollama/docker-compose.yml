services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    user: 0:0
    ports:
      - "${OLLAMA_API_PORT}:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_VULKAN=1
      - AMD_VISIBLE_DEVICES=all
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video

