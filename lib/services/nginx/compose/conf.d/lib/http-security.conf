# ---------- security headers (ngx_http_headers_module) ----------
# Server-scope include. Composed from per-header sub-files so individual
# locations can opt out of specific headers (e.g. let an upstream own its
# Content-Security-Policy, Referrer-Policy, or Permissions-Policy) by
# re-declaring only the remaining sub-files at location scope. nginx
# `add_header` inheritance is replace-not-merge across scopes, so any
# location-scope `add_header` discards server-scope directives at that
# location — upstream headers then pass through unfiltered.

# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
include /etc/nginx/conf.d/lib/http-security-xcto.conf;
include /etc/nginx/conf.d/lib/http-security-referrer.conf;
include /etc/nginx/conf.d/lib/http-security-permissions.conf;
include /etc/nginx/conf.d/lib/http-security-csp.conf;
