# ---------- default Content-Security-Policy ----------
# Separated from http-security-base.conf so the renderer can skip it at
# locations where the upstream emits its own CSP (with nonces, etc.).

add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; script-src 'self' 'wasm-unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; object-src 'self'; base-uri 'self'; frame-ancestors 'self';" always;
