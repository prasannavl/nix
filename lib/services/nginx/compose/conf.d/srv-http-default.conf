server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;                      # [addition]
        index index.html index.htm;                      # [addition]
    }

    # error handling
    error_page 404 /404.html;                            # [addition]
    error_page 500 502 503 504 /50x.html;                # [addition]
    location = /50x.html {
        root /usr/share/nginx/html;                      # [addition]
    }
}
