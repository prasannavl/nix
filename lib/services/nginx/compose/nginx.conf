# =======================
# main (core) context
# =======================

# Core / process-level
user nginx;                                              # [override] default: nobody
worker_processes auto;                                   # [override] default: 1

# logging
error_log /var/log/nginx/error.log notice;               # [override:path]
pid /var/run/nginx.pid;                                  # [override:path]

# (implicit from core module)
# daemon        on;                                      # [default]
# master_process on;                                     # [default]
# worker_rlimit_nofile 0;                                # [default, 0 = no change]
# thread_pool  default threads=32 max_queue=65536;       # [default]

# =======================
# events
# =======================

events {
    worker_connections 1024;                             # [override] default: 512
    # use epoll;                                         # [default]
    # multi_accept off;                                  # [default]
}

# =======================
# http
# =======================

http {
    # ---------- core http basics ----------

    include /etc/nginx/mime.types;                       # [override-path]
    default_type application/octet-stream;               # [override] default: text/plain

    # request/response handling defaults
    # sendfile           on;                             # [default]
    # tcp_nopush         off;                            # [default]
    # tcp_nodelay        on;                             # [default]
    server_tokens off;                                   # [override] default: on

    # ---------- logging (ngx_http_log_module) ----------

    log_format main
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for" '
        'limit_req_status="$limit_req_status"';

    access_log /var/log/nginx/access.log main;           # [override:path+format]

    # log_not_found  on;                                 # [default]
    # log_subrequest on;                                 # [default]

    # ---------- gzip (ngx_http_gzip_module) ----------

    gzip on;                                             # [override] default: off
    # gzip_http_version  1.1;                            # [default]
    gzip_proxied any;                                    # [override] default: off
    gzip_min_length 100;                                 # [override] default: 20
    gzip_comp_level 5;                                   # [override] default: 1
    gzip_buffers 32 4k;                                  # [default]
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/xml
        application/rss+xml
        application/atom+xml
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        font/ttf
        font/otf
        font/woff
        font/woff2
        image/svg+xml;                                   # [override] text/html

    # ---------- client limits / timeouts (ngx_http_core_module) ----------

    client_max_body_size 1m;                             # [default]
    client_body_buffer_size 16k;                         # [default]
    client_header_buffer_size 2k;                        # [override] default: 1k
    large_client_header_buffers 8 8k;                    # [override] default: 4 8k
    client_header_timeout 15s;                           # [default] default: 60s
    client_body_timeout 15s;                             # [default] default: 60s
    send_timeout 15s;                                    # [default] default: 60s

    keepalive_requests 1000;                             # [default] default: 100
    keepalive_disable msie6;                             # [default]
    keepalive_timeout 30s;                               # [override] default: 75s

    lingering_close on;                                  # [default]
    lingering_time 30s;                                  # [default]
    lingering_timeout 5s;                                # [default]

    reset_timedout_connection off;                       # [default]

    # ---------- proxy (ngx_http_proxy_module) ----------

    proxy_buffering on;                                  # [default]
    proxy_buffers 8 8k;                                  # [default]
    proxy_busy_buffers_size 16k;                         # [default]
    proxy_connect_timeout 65s;                           # [default]
    proxy_read_timeout 60s;                              # [default]
    proxy_send_timeout 60s;                              # [default]
    proxy_redirect off;                                  # [default]
    proxy_next_upstream error timeout;                   # [default]
    proxy_next_upstream_tries 0;                         # [default]

    # [possible multi-execution]
    # proxy_next_upstream       error timeout http_502 http_503 http_504;
    # proxy_next_upstream_tries 3;

    # ---------- proxy headers ----------

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' '';
    }

    map $http_x_forwarded_host $forwarded_host_effective {
        default $http_x_forwarded_host;
        '' $host;
    }

    map "$http_x_forwarded_proto:$http_cf_visitor" $forwarded_proto_effective {
        ~^https: https;
        ~^http: http;
        ~^:.*\"scheme\":\"https\" https;
        ~^:.*\"scheme\":\"http\" http;
        default $scheme;
    }

    map $http_x_forwarded_port $forwarded_port_effective {
        default $http_x_forwarded_port;
        '' $server_port;
    }

    map $http_sec_fetch_dest $oauth2_login_fetch_dest_document {
        default 0;
        document 1;
    }

    map $http_accept $oauth2_login_accepts_html {
        default 0;
        "~*text/html" 1;
    }

    map "$oauth2_login_fetch_dest_document:$http_sec_fetch_dest:$oauth2_login_accepts_html" $oauth2_login_redirect_candidate {
        default 0;
        "~^1:" 1;
        "0::1" 1;
    }

    map "$request_method:$oauth2_login_redirect_candidate" $oauth2_login_redirect_allowed {
        default 0;
        "GET:1" 1;
        "HEAD:1" 1;
    }

    proxy_http_version 1.1;                              # [override] default: 1.0

    # Prefer the standard forwarded chain from trusted local proxies such as
    # cloudflared and local reverse proxies.
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # trust only local and private-network proxy hops we control
    set_real_ip_from 127.0.0.1/32;
    set_real_ip_from ::1/128;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from fc00::/7;
    set_real_ip_from fe80::/10;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header CF-Connecting-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto_effective;
    proxy_set_header X-Forwarded-Host $forwarded_host_effective;
    proxy_set_header X-Forwarded-Port $forwarded_port_effective;

    # ---------- SSL (ngx_http_ssl_module) ----------

    ssl_protocols TLSv1.2 TLSv1.3;                       # [default]
    ssl_session_cache shared:SSL:10m;                    # [override] default: none
    ssl_session_timeout 1d;                              # [override] default: 5m
    ssl_prefer_server_ciphers off;                       # [default]

    # ---------- other HTTP modules ----------
    # index index.html;                                  # [default]

    # ---------- virtual hosts ----------

    include /etc/nginx/conf.d/srv-http-*.conf;           # [addition]
    include /etc/nginx/conf.d/metrics-*.conf;            # [addition]
}

stream {
    proxy_connect_timeout 5s;    # faster detection of dead backends
    proxy_timeout 60s;           # idle HTTPS passthrough

    # connection limiting
    limit_conn_zone $binary_remote_addr zone=default:10m;
    limit_conn default 50;

    include /etc/nginx/conf.d/srv-stream-*.conf;         # [addition]
}
